<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Midnight C++ SDK</title>
  <desc id="desc">A professional banner showing the Midnight C++ SDK pipeline from C++ applications through ledger FFI, proof server, node RPC, indexer, and artifacts.</desc>
  <defs>

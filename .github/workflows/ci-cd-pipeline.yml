name: Midnight SDK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly builds at 2 AM UTC
    - cron: '0 2 * * *'

env:
  BUILD_TYPE: Release
  CMAKE_VERSION: '3.20'

jobs:
  # =========================================================================
  # Job 1: Build and Unit Tests (All Platforms)
  # =========================================================================

  build-and-test:
    name: Build & Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            shell: bash
            compiler: gcc
          - os: windows-latest
            shell: pwsh
            compiler: msvc
          - os: macos-latest
            shell: bash
            compiler: clang

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Full history for versioning

    - name: Setup CMake
      uses: lukka/get-cmake@latest
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libssl-dev \
          libsodium-dev \
          nlohmann-json3-dev \
          libfmt-dev \
          googletest-dev \
          google-mock-dev

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install -y ninja cmake openssl
        vcpkg integrate install || true

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake openssl libsodium nlohmann-json fmt googletest

    - name: Create Build Directory
      run: cmake -E make_directory ${{ github.workspace }}/build

    - name: Configure CMake
      shell: bash
      working-directory: ${{ github.workspace }}/build
      run: |
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DBUILD_TESTS=ON \
          -DBUILD_EXAMPLES=ON \
          -DENABLE_BLOCKCHAIN=ON \
          -DENABLE_WEBSOCKET=ON

    - name: Build Project
      working-directory: ${{ github.workspace }}/build
      run: cmake --build . --config ${{ env.BUILD_TYPE }} --parallel 4

    - name: Run Unit Tests (All 98 Tests)
      working-directory: ${{ github.workspace }}/build
      run: ctest --output-on-failure -V --timeout 120

    - name: Upload Build Artifacts
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs-${{ matrix.os }}
        path: ${{ github.workspace }}/build/CMakeFiles/
        retention-days: 7

  # =========================================================================
  # Job 2: Code Quality Analysis
  # =========================================================================

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run cppcheck (Static Analysis)
      uses: addon-si/github-action-cppcheck@v1.3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        other_options: --enable=all --suppress=missingIncludeSystem

    - name: Run clang-format Check
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

        # Check formatting
        find include src tests examples -name "*.hpp" -o -name "*.cpp" | while read file; do
          clang-format -i "$file"
        done

        if ! git diff --quiet; then
          echo "Code formatting issues found. Run clang-format locally:"
          git diff
          exit 1
        fi

  # =========================================================================
  # Job 3: Security Scanning
  # =========================================================================

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'Midnight SDK'
        path: '.'
        format: 'JSON'
        args: >
          --enable-retired

    - name: Upload OWASP Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: owasp-results
        path: reports/
        retention-days: 30

    - name: Run Trivy Vulnerability Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './src'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy Results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # =========================================================================
  # Job 4: Integration Testing (Preprod Network)
  # =========================================================================

  integration-test:
    name: Integration Testing - Preprod Network
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup CMake and Build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
        cmake --build . --parallel 4

    - name: Run Integration Tests
      working-directory: ./build
      run: ctest -R "integration\|Preprod" --output-on-failure -V --timeout 300
      env:
        # Note: In production, use encrypted secrets
        MIDNIGHT_TEST_PRIVATE_KEY: ${{ secrets.MIDNIGHT_TEST_PRIVKEY }}
        MIDNIGHT_TEST_ADDRESS: ${{ secrets.MIDNIGHT_TEST_ADDRESS }}

    - name: Generate Integration Report
      if: always()
      run: |
        echo "Integration test results available at:"
        echo "https://indexer.preprod.midnight.network/api/v3/graphql"

  # =========================================================================
  # Job 5: Example Programs Build
  # =========================================================================

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev libsodium-dev

    - name: Build Examples
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=ON
        cmake --build . --target voting-contract --parallel 4

    - name: Test Examples
      run: |
        cd build
        ./bin/voting-contract || true

  # =========================================================================
  # Job 6: Documentation Generation
  # =========================================================================

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Doxygen
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz

    - name: Generate Doxygen Documentation
      run: |
        doxygen Doxyfile || echo "Doxyfile not found, skipping"

    - name: Record SDK Version
      run: |
        mkdir -p docs/version
        echo "Version: $(git describe --tags --always)" > docs/version/current.txt
        echo "Build Date: $(date)" >> docs/version/current.txt
        echo "Commit: $(git rev-parse HEAD)" >> docs/version/current.txt

    - name: Upload Documentation
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: docs/
        retention-days: 30

  # =========================================================================
  # Job 7: Performance Benchmarking (Nightly)
  # =========================================================================

  performance-benchmark:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || contains(github.event.head_commit.message, '[benchmark]')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Build
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev libsodium-dev
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel 4

    - name: Run Benchmarks
      run: |
        cd build

        echo "=== Performance Benchmarks ===" > benchmark_results.txt
        echo "Test Suite: Midnight SDK" >> benchmark_results.txt
        echo "Date: $(date)" >> benchmark_results.txt
        echo "Compiler: $(gcc --version | head -1)" >> benchmark_results.txt
        echo "" >> benchmark_results.txt

        # Phase 1: Node Connection
        echo "[Phase 1] Node Connection Performance:" >> benchmark_results.txt
        /usr/bin/time -v ./bin/node-connection_test 2>&1 | grep -E "Elapsed|User|System" >> benchmark_results.txt || true
        echo "" >> benchmark_results.txt

        # Phase 4: ZK Proofs (critical performance)
        echo "[Phase 4] ZK-SNARK Performance:" >> benchmark_results.txt
        /usr/bin/time -v ./bin/zk-proofs_test 2>&1 | grep -E "Elapsed|User|System" >> benchmark_results.txt || true
        echo "" >> benchmark_results.txt

        # Phase 6: Monitoring (throughput test)
        echo "[Phase 6] Monitoring Throughput:" >> benchmark_results.txt
        /usr/bin/time -v ./bin/monitoring-finality_test 2>&1 | grep -E "Elapsed|User|System" >> benchmark_results.txt || true

        cat benchmark_results.txt

    - name: Store Benchmark Results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results-${{ github.run_id }}
        path: build/benchmark_results.txt
        retention-days: 90

  # =========================================================================
  # Job 8: Release Build and Package
  # =========================================================================

  release-package:
    name: Release Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, code-quality, security-scan]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Extract Version
      id: version
      run: |
        VERSION=${GITHUB_REF/refs\/tags\/v/}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libsodium-dev nlohmann-json3-dev

    - name: Build and Package
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --parallel 4
        cmake --install . --prefix ../midnight-sdk-v${{ env.VERSION }}

    - name: Create Archive (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        tar -czf midnight-sdk-${{ runner.os }}-v${{ env.VERSION }}.tar.gz \
          midnight-sdk-v${{ env.VERSION }}

    - name: Create Archive (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        7z a midnight-sdk-${{ runner.os }}-v${{ env.VERSION }}.zip `
          midnight-sdk-v${{ env.VERSION }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          midnight-sdk-*.tar.gz
          midnight-sdk-*.zip
        body: |
          # Midnight SDK v${{ env.VERSION }}

          Build Date: ${{ github.event.created_at }}
          Commit: ${{ github.sha }}

          ## Features
          - Phase 1: Node Connection (sr25519/AURA/GRANDPA)
          - Phase 2: Compact Contracts
          - Phase 3: UTXO Transactions
          - Phase 4: ZK Proofs
          - Phase 5: Signing & Submission
          - Phase 6: Monitoring & Finality

          ## Test Coverage
          - 98 unit tests (all passing)
          - Preprod integration tests
          - Performance benchmarks

          See [Documentation](https://github.com/${{ github.repository }}/wiki) for usage.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # Job 9: Notification / Status Report
  # =========================================================================

  notify:
    name: Notification & Status Report
    runs-on: ubuntu-latest
    if: always()
    needs: [build-and-test, code-quality, security-scan]

    steps:
    - name: Build Status Summary
      run: |
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║   Midnight SDK CI/CD Pipeline - Status Report          ║"
        echo "╠════════════════════════════════════════════════════════╣"
        echo "║ Build & Test:      ${{ needs.build-and-test.result }}"
        echo "║ Code Quality:      ${{ needs.code-quality.result }}"
        echo "║ Security Scan:     ${{ needs.security-scan.result }}"
        echo "╠════════════════════════════════════════════════════════╣"
        echo "║ Commit:     ${{ github.sha }}"
        echo "║ Branch:     ${{ github.ref }}"
        echo "║ Author:     ${{ github.actor }}"
        echo "╚════════════════════════════════════════════════════════╝"

    - name: Slack Notification
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "🚨 Midnight SDK CI/CD Pipeline Failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Repository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\n\n❌ Build Status: FAILED"
                }
              }
            ]
          }

    - name: Success Notification
      if: success()
      run: |
        echo "✅ All CI/CD checks passed!"
        echo "📊 Test Results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

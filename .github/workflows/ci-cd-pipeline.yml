name: Midnight SDK CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_live_preview:
        description: "Run gated live Preview tests"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja

jobs:
  build-and-test:
    name: Build & Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libsodium-dev \
            nlohmann-json3-dev \
            libfmt-dev \
            libjsoncpp-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja openssl libsodium nlohmann-json fmt jsoncpp

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y ninja cmake openssl

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build \
            -G "$CMAKE_GENERATOR" \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DBUILD_TESTS=ON \
            -DBUILD_EXAMPLES=ON \
            -DENABLE_BLOCKCHAIN=ON \
            -DENABLE_WEBSOCKET=ON \
            -DENABLE_GRPC=OFF \
            -DMIDNIGHT_BUILD_LEDGER_FFI=OFF \
            -DMIDNIGHT_REQUIRE_OPENSSL_FOR_BLOCKCHAIN=OFF

      - name: Build Project
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure --timeout 180

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/
          if-no-files-found: ignore
          retention-days: 7

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Quality Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build cppcheck

      - name: Whitespace Check
        run: git diff --check

      - name: Shell Syntax Check
        run: bash -n tools/midnight-preprod-live.sh

      - name: SVG Asset Check
        run: |
          sudo apt-get install -y libxml2-utils
          xmllint --noout docs/assets/midnight-cpp-sdk.svg

      - name: CMake Configure Smoke
        run: |
          cmake -S . -B build-quality \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DENABLE_GRPC=OFF \
            -DMIDNIGHT_BUILD_LEDGER_FFI=OFF \
            -DMIDNIGHT_REQUIRE_OPENSSL_FOR_BLOCKCHAIN=OFF

      - name: Cppcheck
        run: |
          cppcheck --version
          cppcheck \
            --enable=warning \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -I include \
            src include

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ensure Local Secret Paths Are Not Tracked
        run: |
          forbidden='^(\.secrets/|midnight_cache/|midnight-artifacts/|.*\.seed$|.*\.pem$|.*\.key$|\.env(\..*)?$)'
          if git ls-files | grep -E "$forbidden"; then
            echo "Tracked local secret/cache artifact detected."
            exit 1
          fi

      - name: Scan For Obvious Secret Material
        run: |
          if git grep -nE '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{36,}|xox[baprs]-[A-Za-z0-9-]+)' -- \
              ':!docs/MIDNIGHT_CXX_SDK_CONTEXT.md' \
              ':!docs/SDK_SPEC.md' \
              ':!golden-fixtures/**' \
              ':!tests/**'; then
            echo "Potential secret-like material found in tracked source."
            exit 1
          fi

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Documentation Files
        run: |
          test -f README.md
          test -f docs/SDK_SPEC.md
          test -f docs/MIDNIGHT_CXX_SDK_CONTEXT.md
          test -f golden-fixtures/README.md
          test -f docs/assets/midnight-cpp-sdk.svg

      - name: Record SDK Version
        run: |
          mkdir -p docs/version
          {
            echo "Version: $(git describe --tags --always)"
            echo "Build Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: $(git rev-parse HEAD)"
          } > docs/version/current.txt

      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            README.md
            docs/
            golden-fixtures/
          retention-days: 30

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libsodium-dev \
            nlohmann-json3-dev \
            libfmt-dev \
            libjsoncpp-dev

      - name: Configure Examples
        run: |
          cmake -S . -B build-examples \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=ON \
            -DENABLE_GRPC=OFF \
            -DMIDNIGHT_BUILD_LEDGER_FFI=OFF \
            -DMIDNIGHT_REQUIRE_OPENSSL_FOR_BLOCKCHAIN=OFF

      - name: Build Examples
        run: cmake --build build-examples --parallel 4

  live-preview:
    name: Integration Testing - Preview Network
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_preview

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libsodium-dev \
            nlohmann-json3-dev \
            libfmt-dev \
            libjsoncpp-dev

      - name: Configure Live Test Build
        run: |
          cmake -S . -B build-live \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DBUILD_EXAMPLES=ON \
            -DENABLE_GRPC=OFF \
            -DMIDNIGHT_BUILD_LEDGER_FFI=ON

      - name: Build Live Test Target
        run: cmake --build build-live --target midnight-tests preprod_live_flow --parallel 4

      - name: Run Gated Live Tests
        run: ctest --test-dir build-live --output-on-failure --timeout 900
        env:
          MIDNIGHT_RUN_LIVE_SUBMIT_TESTS: "1"
          MIDNIGHT_NETWORK: preview
          MIDNIGHT_LIVE_NODE_URL: ${{ secrets.MIDNIGHT_LIVE_NODE_URL }}
          MIDNIGHT_LIVE_SOURCE_URL: ${{ secrets.MIDNIGHT_LIVE_SOURCE_URL }}
          MIDNIGHT_LIVE_INDEXER_URL: ${{ secrets.MIDNIGHT_LIVE_INDEXER_URL }}
          MIDNIGHT_LIVE_PROOF_SERVER_URL: ${{ secrets.MIDNIGHT_LIVE_PROOF_SERVER_URL }}
          MIDNIGHT_LIVE_SOURCE_SEED: ${{ secrets.MIDNIGHT_LIVE_SOURCE_SEED }}
          MIDNIGHT_LIVE_DESTINATION_ADDRESS: ${{ secrets.MIDNIGHT_LIVE_DESTINATION_ADDRESS }}
          MIDNIGHT_LIVE_AMOUNT: ${{ secrets.MIDNIGHT_LIVE_AMOUNT }}

  notify:
    name: Notification & Status Report
    runs-on: ubuntu-latest
    if: always()
    needs: [build-and-test, code-quality, security-scan, documentation]

    steps:
      - name: Build Status Summary
        run: |
          echo "Midnight SDK CI/CD Pipeline"
          echo "Build & Test:  ${{ needs.build-and-test.result }}"
          echo "Code Quality:  ${{ needs.code-quality.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Documentation: ${{ needs.documentation.result }}"
          echo "Commit:        ${{ github.sha }}"
          echo "Branch:        ${{ github.ref }}"
